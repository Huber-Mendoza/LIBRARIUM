<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector - Librarium</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="reader-body">

  <div class="reader-header">
    <a href="#" id="backToMangaBtn" class="reader-back">← Volver al Manga</a>
    <div id="readerTitle" class="reader-title">Cargando Capítulo...</div>
    <div class="reader-options">
       <!-- Option to change BG color or font size could go here -->
    </div>
  </div>

  <div class="reader-content" id="readerContent">
    <!-- El contenido simulado del capítulo irá aquí -->
  </div>

  <div class="reader-footer">
    <button id="prevChapBtn" class="reader-btn">Anterior</button>
    <button id="nextChapBtn" class="reader-btn">Siguiente</button>
  </div>

  <script src="assets/js/script.js"></script>
</body>
</html>
