<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - Librarium</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-logo">
        LIBR<span>ARIUM</span>
      </a>
      <nav class="main-nav">
        <a href="index.html">Inicio</a>
        <a href="catalog.html" class="active">Catálogo</a>
      </nav>
      <div class="header-actions">
        <div class="search-form">
          <input type="text" id="searchInput" class="search-input" placeholder="Buscar..." oninput="handleSearch()">
        </div>
      </div>
    </div>
  </header>

  <div class="container catalog-container">
    <div style="grid-column: 1/-1;">
      <h2 class="section-title" id="catalogTitle">Catálogo Completo</h2>
      
      <!-- Catalog filters -->
      <div class="catalog-filters">
        <button class="filter-btn active" onclick="setFilterGenre(this, '')">Todos</button>
        <button class="filter-btn" onclick="setFilterGenre(this, 'Fantasía')">Fantasía</button>
        <button class="filter-btn" onclick="setFilterGenre(this, 'Romance')">Romance</button>
        <button class="filter-btn" onclick="setFilterGenre(this, 'Misterio')">Misterio</button>
        <button class="filter-btn" onclick="setFilterGenre(this, 'Ciencia Ficción')">Sci-Fi</button>
        <button class="filter-btn" onclick="setFilterGenre(this, 'Isekai')">Isekai</button>
      </div>

      <div class="manga-grid" id="booksGrid" style="margin-top:2rem;">
        <!-- Renderizado dinámicamente -->
      </div>
    </div>
  </div>

  <footer>
    <p>© 2024 Librarium Manga. Todos los derechos reservados.</p>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
